<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday</title>
  <link href="C:\Users\user\Desktop\HBD\images\del.jpeg" rel="stylesheet"/>

</head>
<body>

<!-- ── SECTION 1 ── -->
<section id="hero">

  <!-- Background image via picsum (replace src with your own) -->
  <img
    class="hero-img"
    src="C:\Users\user\Desktop\HBD\images\del.jpeg"
    alt="Birthday celebration background"
  />

  <div class="hero-overlay"></div>

  <!-- Sparkle particles -->
  <span class="sparkle" style="width:8px;height:8px;  top:20%;left:15%;--dur:4s;--delay:0s"></span>
  <span class="sparkle" style="width:5px;height:5px;  top:65%;left:25%;--dur:5s;--delay:1s"></span>
  <span class="sparkle" style="width:10px;height:10px;top:35%;left:78%;--dur:3.5s;--delay:0.5s"></span>
  <span class="sparkle" style="width:6px;height:6px;  top:55%;left:88%;--dur:6s;--delay:2s"></span>
  <span class="sparkle" style="width:7px;height:7px;  top:80%;left:60%;--dur:4.5s;--delay:1.5s"></span>
  <span class="sparkle" style="width:4px;height:4px;  top:12%;left:55%;--dur:5.5s;--delay:0.8s"></span>

  <div class="hero-content">
    <p class="eyebrow">✦ A Special Celebration ✦</p>
    <h1>Happy Birthday</h1>
    <p class="subtitle">Wishing you a day as magical as you are</p>
  </div>

  <div class="scroll-cue">scroll</div>
</section>

<!-- ── SECTION 2 (placeholder) ── -->
<section id="section2">
  <p>— more to come —</p>
</section>

</body>
</html>
